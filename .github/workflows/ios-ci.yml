name: iOS CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve iOS Simulator
        run: |
          set -euo pipefail
          UDID=$(xcrun simctl list devices --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get(\"devices\", {}).items():
              if \"iOS\" not in runtime:
                  continue
              for d in devices:
                  if d.get(\"isAvailable\") and d.get(\"name\", \"\").startswith(\"iPhone\"):
                      print(d[\"udid\"])
                      sys.exit(0)
          print(\"No available iPhone simulator found\", file=sys.stderr)
          sys.exit(1)
          ")
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
          echo "Using simulator UDID=$UDID"

      - name: Build app (No Code Signing)
        run: |
          xcodebuild clean build \
          -project CICDDemoApp.xcodeproj \
          -scheme CICDDemoApp \
          -destination "platform=iOS Simulator,id=${SIMULATOR_UDID}" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test \
          -project CICDDemoApp.xcodeproj \
          -scheme CICDDemoApp \
          -destination "platform=iOS Simulator,id=${SIMULATOR_UDID}" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
