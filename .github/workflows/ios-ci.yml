name: iOS CI with Fastlane

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Select Xcode (optional but safe)
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      # 3. Cache Ruby gems (speeds up Fastlane)
      - name: Cache Ruby Gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      # 4. Install Fastlane (via bundler if possible)
      - name: Install Fastlane
        run: |
          if [ -f "Gemfile" ]; then
            gem install bundler
            bundle install --path vendor/bundle
          else
            brew install fastlane
          fi

      # 5. Run Fastlane CI lane
      - name: Run Fastlane CI
        run: |
          if [ -f "Gemfile" ]; then
            bundle exec fastlane ci
          else
            fastlane ci
          fi