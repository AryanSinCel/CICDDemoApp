name: iOS CI Pipeline

on: # Run pipeline when you push to main branch
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest # GitHub provides a Mac machine (this is why GitHub Actions is powerful for iOS)

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # Downloads your repo into the runner (Mac machine)

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app
        run: |
          xcodebuild clean build \
          -project CICDDemoApp.xcodeproj \
          -scheme CICDDemoApp \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO